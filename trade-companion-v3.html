@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap');
:root{--bg-0:#0c0d10;--bg-1:#13141a;--bg-2:#1a1b22;--bg-3:#22232c;--bg-4:#2c2d38;--bg-h:#2a2b36;--bs:#252630;--bm:#33343f;--bx:#44455a;--t1:#f0ede6;--t2:#b8b5ac;--t3:#7d7a72;--t4:#55534d;--bull:#2dd4a0;--bull-d:#1a5c45;--bull-bg:rgba(45,212,160,.07);--bear:#f87171;--bear-d:#6b2020;--bear-bg:rgba(248,113,113,.07);--gold:#fbbf24;--gold-bg:rgba(251,191,36,.08);--blue:#60a5fa;--blue-b:#93c5fd;--blue-bg:rgba(96,165,250,.08);--blue-gl:rgba(96,165,250,.15);--f:'Inter',system-ui,sans-serif;--m:'JetBrains Mono','SF Mono',Consolas,monospace;--r:10px;--rl:14px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;background:var(--bg-0);color:var(--t1);font-family:var(--f);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-1)}::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px}
.app{display:grid;grid-template-rows:auto 1fr auto;height:100vh;overflow:hidden}

/* HEADER */
.hdr{background:var(--bg-1);border-bottom:1px solid var(--bm);padding:12px 24px;display:flex;align-items:center;gap:20px}
.hdr-logo{height:100px;width:100px;border-radius:8px;object-fit:contain}
.hdr-br{padding-right:16px;border-right:1px solid var(--bs)}
.hdr-br-n{font-size:11px;font-weight:800;letter-spacing:3px;color:var(--t3);text-transform:uppercase}
.hdr-br-date{font-size:10px;color:var(--t4);letter-spacing:1px;margin-top:1px}
.hdr-plan-date{background:var(--gold-bg);border:1px solid rgba(251,191,36,.2);border-radius:var(--r);padding:8px 16px;text-align:center}
.hdr-plan-label{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px}
.hdr-plan-val{font-size:16px;font-weight:800;color:var(--t1);margin-top:2px;white-space:nowrap}
.hdr-lean{flex:1;min-width:0}
.hdr-lean-l{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:2px}
.hdr-lean-t{font-size:16px;font-weight:500;color:var(--t1);line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-p{display:flex;align-items:baseline;gap:8px;background:var(--bg-2);border:2px solid var(--bm);border-radius:var(--r);padding:8px 14px;transition:border-color .2s}
.hdr-p:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}
.hdr-p-l{font-size:13px;font-weight:700;color:var(--t3)}
.hdr-p-i{font-family:var(--m);font-size:30px;font-weight:800;color:var(--blue-b);background:transparent;border:none;outline:none;width:90px;text-align:right}
.hdr-pnl{text-align:right;min-width:150px;padding-left:16px;border-left:1px solid var(--bs)}
.hdr-pnl-v{font-family:var(--m);font-size:32px;font-weight:800;letter-spacing:-1px;line-height:1}
.hdr-pnl-v.pos{color:var(--bull)}.hdr-pnl-v.neg{color:var(--bear)}.hdr-pnl-v.flat{color:var(--t3)}
.hdr-pnl-l{font-size:11px;color:var(--t3);margin-top:2px}

/* MAIN */
.main{display:grid;grid-template-columns:320px 1fr;overflow:hidden}
.lw{background:var(--bg-1);border-right:1px solid var(--bm);display:flex;flex-direction:column;overflow:hidden}
.lb{padding:8px 16px;border-bottom:1px solid var(--bs);display:flex;align-items:center;justify-content:space-between}
.lb-t{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:2px}
.ls{flex:1;overflow-y:auto}
.lr{display:grid;grid-template-columns:46px 1fr 46px;align-items:center;min-height:38px;padding:0 16px;border-left:4px solid transparent;transition:background .1s}
.lr:hover{background:var(--bg-h)}
.lr .st{font-size:14px;font-weight:600;color:var(--bull)}.lr .st.d{color:var(--bull-d);font-weight:400}
.lr .rt{font-size:14px;font-weight:600;color:var(--bear);text-align:right}.lr .rt.d{color:var(--bear-d);font-weight:400}
.lr .lv{font-family:var(--m);font-size:19px;font-weight:500;text-align:center;color:var(--t2);padding:5px 0}
.lr.mj .lv{color:var(--gold);font-weight:800;font-size:21px}.lr.mj{background:var(--gold-bg)}
.lr.bd{border-left-color:var(--blue);background:var(--blue-bg)}.lr.bd .lv{color:var(--blue-b);font-weight:700}
.pbw{padding:3px 12px}
.pb{background:linear-gradient(135deg,#2563eb,#3b82f6);border-radius:var(--r);padding:10px 0;text-align:center;font-family:var(--m);font-size:26px;font-weight:800;color:#fff;letter-spacing:2px;box-shadow:0 0 20px var(--blue-gl)}

/* RIGHT */
.rp{display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;background:var(--bg-1);border-bottom:1px solid var(--bm);padding:0 16px}
.tab{padding:12px 18px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--t2)}.tab.on{color:var(--t1);border-bottom-color:var(--gold)}
.tc{flex:1;overflow-y:auto;padding:16px 20px;display:none}.tc.on{display:block}
.gpg{display:grid;grid-template-columns:1fr 1fr;gap:14px}.gpf{grid-column:1/-1}
.card{background:var(--bg-2);border:1px solid var(--bs);border-radius:var(--rl);padding:18px 20px}
.ch{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ch .dot{width:9px;height:9px;border-radius:50%}
.c-bu .ch{color:var(--bull)}.c-bu .ch .dot{background:var(--bull)}
.c-be .ch{color:var(--bear)}.c-be .ch .dot{background:var(--bear)}
.c-go .ch{color:var(--gold)}.c-go .ch .dot{background:var(--gold)}
.c-bl .ch{color:var(--blue)}.c-bl .ch .dot{background:var(--blue)}
.sl{list-style:none}.si{font-size:16px;padding:6px 0;color:var(--t1);display:flex;align-items:flex-start;gap:10px;line-height:1.45;border-bottom:1px solid var(--bs)}
.si:last-child{border-bottom:none}.si .bul{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.c-bu .si .bul{background:var(--bull)}.c-be .si .bul{background:var(--bear)}
.si .p{font-family:var(--m);font-weight:700}.c-bu .si .p{color:var(--bull)}.c-be .si .p{color:var(--bear)}
.si.hit{opacity:.3}
.ti{font-size:15px;color:var(--t1);padding:8px 0;line-height:1.5;border-bottom:1px solid var(--bs)}
.ti:last-child{border-bottom:none}.ti .hl{color:var(--gold);font-family:var(--m);font-weight:700;font-size:17px}
.bg{display:flex;flex-wrap:wrap;gap:8px}
.bc{background:var(--bg-3);border:1px solid var(--bm);border-radius:var(--r);padding:10px 16px;min-width:130px}
.bc-p{font-family:var(--m);font-size:22px;font-weight:800;color:var(--blue-b)}
.bc-n{font-size:12px;color:var(--t3);font-weight:500;margin-top:2px}

/* TL;DR */
.tldr-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.tldr-stat{background:var(--bg-2);border:1px solid var(--bs);border-radius:var(--r);padding:14px;text-align:center}
.tldr-stat-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.tldr-stat-val{font-family:var(--m);font-size:26px;font-weight:800;line-height:1}
.tldr-stat-sub{font-size:11px;color:var(--t3);margin-top:3px}
.tldr-section{margin-bottom:20px}
.tldr-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tldr-insight{background:var(--bg-2);border:1px solid var(--bs);border-radius:var(--r);padding:14px 18px;margin-bottom:8px}
.tldr-tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:inline-block}
.tldr-tag.caution{background:var(--bear-bg);color:var(--bear)}
.tldr-tag.opportunity{background:var(--bull-bg);color:var(--bull)}
.tldr-tag.context{background:var(--gold-bg);color:var(--gold)}
.tldr-tag.key{background:var(--blue-bg);color:var(--blue)}
.tldr-insight-text{font-size:16px;color:var(--t1);line-height:1.5}
.tldr-insight-text strong{color:var(--t1);font-weight:700}
.tldr-insight-text .num{font-family:var(--m);font-weight:700;color:var(--gold)}

/* TRADE BAR */
.tb{background:var(--bg-1);border-top:1px solid var(--bm);padding:10px 24px;max-height:260px;overflow-y:auto}
.tb-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tb-t{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:2px}
.btn{font-family:var(--f);font-size:13px;font-weight:700;padding:8px 18px;border-radius:var(--r);cursor:pointer;border:2px solid;background:transparent;transition:all .15s}
.btn:active{transform:scale(.97)}
.b-p{border-color:var(--blue);color:var(--blue)}.b-p:hover{background:var(--blue-bg)}
.b-s{border-color:var(--bull);color:var(--bull)}.b-s:hover{background:var(--bull-bg)}
.b-w{border-color:var(--gold);color:var(--gold)}.b-w:hover{background:var(--gold-bg)}
.b-d{border-color:var(--bear);color:var(--bear)}.b-d:hover{background:var(--bear-bg)}
.b-sm{font-size:11px;padding:5px 12px}
.bg2{display:flex;gap:8px}
.tc2{grid-template-columns:76px 66px 86px 86px 96px 52px 136px 106px 44px}
.th{display:grid;gap:6px;padding:3px 0;font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:1px}
.tr{display:grid;gap:6px;padding:8px 0;border-top:1px solid var(--bs);align-items:center;font-size:15px}
.tr .mv{font-family:var(--m);font-size:16px;font-weight:600;color:var(--t1)}
.tr .pg{color:var(--bull);font-family:var(--m);font-size:18px;font-weight:800}
.tr .pr{color:var(--bear);font-family:var(--m);font-size:18px;font-weight:800}
.tr .sl2{color:var(--bull);font-weight:700}.tr .ss{color:var(--bear);font-weight:700}
.sp{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;background:var(--gold-bg);color:var(--gold);display:inline-block}
.rp2{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;background:var(--bull-bg);color:var(--bull)}
.dx{background:none;border:none;color:var(--t4);cursor:pointer;font-size:15px;border-radius:4px;padding:2px 5px}
.dx:hover{background:var(--bear-bg);color:var(--bear)}
.nt{padding:14px 0;font-size:14px;color:var(--t4);text-align:center}

/* MODALS */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.md{background:var(--bg-2);border:1px solid var(--bm);border-radius:var(--rl);padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.md.w{width:640px}
.md h2{font-size:18px;font-weight:800;color:var(--t1);margin-bottom:20px}
.md label{display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;margin-top:16px}
.md label:first-of-type{margin-top:0}
.md input,.md select,.md textarea{width:100%;padding:10px 14px;background:var(--bg-3);border:2px solid var(--bm);border-radius:var(--r);color:var(--t1);font-family:var(--m);font-size:16px;font-weight:600;outline:none}
.md input:focus,.md select:focus,.md textarea:focus{border-color:var(--blue)}
.md textarea{min-height:160px;font-size:13px;font-weight:400;resize:vertical}
.md .r2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.md .ac{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}
.pv{margin-top:14px;padding:12px;background:var(--bg-3);border-radius:var(--r);font-size:14px;color:var(--t2);border:1px solid var(--bs)}
.pv b{color:var(--gold);font-family:var(--m)}

/* TOUR — spotlight uses box-shadow cutout */
.tour-spot{display:none;position:fixed;z-index:500;border-radius:var(--r);box-shadow:0 0 0 9999px rgba(6,7,10,.88),0 0 0 4px var(--gold);transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none}
.tour-spot.on{display:block}
.tour-spot.ctr{width:2px;height:2px;left:50%;top:50%;box-shadow:0 0 0 9999px rgba(6,7,10,.92);border-radius:0}
.tour-tip{display:none;position:fixed;z-index:501;background:var(--bg-2);border:2px solid var(--gold);border-radius:var(--rl);padding:24px 28px;max-width:460px;width:88vw;box-shadow:0 16px 48px rgba(0,0,0,.6);overflow-y:auto;max-height:80vh}
.tour-tip.on{display:block}
.tour-arrow{position:absolute;width:0;height:0}
.tour-arrow.up{top:-12px;left:36px;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:12px solid var(--gold)}
.tour-arrow.down{bottom:-12px;left:36px;border-left:12px solid transparent;border-right:12px solid transparent;border-top:12px solid var(--gold)}
.tour-arrow.left{left:-12px;top:26px;border-top:12px solid transparent;border-bottom:12px solid transparent;border-right:12px solid var(--gold)}
.tour-arrow.right{right:-12px;top:26px;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:12px solid var(--gold)}
.tour-sn{font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.tour-tt{font-size:20px;font-weight:800;color:var(--t1);margin-bottom:8px;line-height:1.3}
.tour-bd{font-size:16px;color:var(--t2);line-height:1.55;margin-bottom:16px}
.tour-bd strong{color:var(--t1);font-weight:700}
.tour-btns{display:flex;gap:10px;justify-content:space-between;align-items:center}
.tour-dots{display:flex;gap:4px}.tour-dot{width:7px;height:7px;border-radius:50%;background:var(--bm)}.tour-dot.on{background:var(--gold);width:20px;border-radius:4px}
.tour-next{font-family:var(--f);font-size:15px;font-weight:800;padding:10px 28px;background:var(--gold);color:var(--bg-0);border:none;border-radius:var(--r);cursor:pointer;letter-spacing:1px;white-space:nowrap}
.tour-next:hover{filter:brightness(1.1)}
.tour-skip{font-family:var(--f);font-size:13px;font-weight:600;padding:8px 16px;background:transparent;color:var(--t3);border:1px solid var(--bm);border-radius:var(--r);cursor:pointer;white-space:nowrap}
.tour-skip:hover{color:var(--t1)}

/* Scroll + help buttons — BOTTOM RIGHT, not overlapping ladder */
.fab-wrap{position:fixed;bottom:275px;right:24px;z-index:50;display:flex;flex-direction:column;gap:8px}
.fab{border:none;border-radius:50%;width:38px;height:38px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:hover{transform:scale(1.1)}
.fab-scroll{background:linear-gradient(135deg,#2563eb,#3b82f6);color:white;box-shadow:0 3px 12px rgba(59,130,246,.4)}
.fab-tour{background:linear-gradient(135deg,#ca8a04,#eab308);color:var(--bg-0);box-shadow:0 3px 12px rgba(234,179,8,.3);font-weight:800}
</style>
</head>

/* PARSER */
function parseE(t){
  const o={s:[],r:[],l:'',planDate:''};
  const pL=b=>{const a=[];const re=/(\d{4})(?:\s*[-–]\s*(\d{2,4}))?\s*(\(major\))?/g;let m;while((m=re.exec(b))!==null){a.push([parseInt(m[1]),m[3]?1:0]);if(m[2]){let e=m[2];if(e.length<=2)e=m[1].slice(0,4-e.length)+e;a.push([parseInt(e),m[3]?1:0]);}}return a;};
  const sm=t.match(/Supports?\s+are:?\s*([^\n]+(?:\n(?!Resist)[^\n]+)*)/i);if(sm)o.s=pL(sm[1].replace(/\n/g,' '));
  const rm=t.match(/Resistances?\s+are:?\s*([^\n]+(?:\n(?!In terms|Bull|Bear|\n\n)[^\n]+)*)/i);if(rm)o.r=pL(rm[1].replace(/\n/g,' '));
  const lm=t.match(/In summary[^:]*:\s*([^\n]+(?:\n(?!Support|Resist|\n)[^\n]{10,}){0,3})/i);if(lm)o.l=lm[1].replace(/\n/g,' ').trim().slice(0,250);
  // Parse plan date: "Trade Plan Monday" etc
  const dayMatch=t.match(/Trade\s+Plan\s+(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)/i);
  // Parse send date from header: "Apr 17" or "April 17" patterns
  const dateMatch=t.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+(\d{1,2})(?:\s*,?\s*(\d{4}))?/i);
  if(dayMatch&&dateMatch){
    const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const targetDay=dayNames.findIndex(d=>d.toLowerCase()===dayMatch[1].toLowerCase());
    const sendMonth=monthNames.findIndex(m=>dateMatch[1].toLowerCase().startsWith(m.toLowerCase()));
    const sendDay=parseInt(dateMatch[2]);
    const sendYear=dateMatch[3]?parseInt(dateMatch[3]):new Date().getFullYear();
    if(targetDay>=0&&sendMonth>=0){
      const sendDate=new Date(sendYear,sendMonth,sendDay);
      // Find next occurrence of target day after send date
      for(let i=1;i<=7;i++){
        const check=new Date(sendDate.getTime()+i*86400000);
        if(check.getDay()===targetDay){
          const mName=check.toLocaleDateString('en-US',{month:'long'});
          o.planDate=dayNames[targetDay]+', '+mName+' '+check.getDate();
          break;
        }
      }
    }
  }
  return o;
}

<div class="tour-btns"><div style="display:flex;align-items:center;gap:10px"><button class="tour-skip" onclick="endTour()">Skip</button><div class="tour-dots">${dots}</div></div><button class="tour-next" onclick="nextStep()">${isLast?"Let's Trade →":isFirst?"Start Tour →":"Next →"}</button></div>`;
  tip.classList.add('on');
  if(!step.target){spot.classList.add('on','ctr');spot.style.left='50%';spot.style.top='50%';spot.style.width='2px';spot.style.height='2px';tip.style.left='50%';tip.style.top='50%';tip.style.transform='translate(-50%,-50%)';return;}
  tip.style.transform='none';spot.classList.remove('ctr');
  const tgt=document.getElementById(step.target);if(!tgt){nextStep();return;}
  tgt.scrollIntoView({block:'nearest',behavior:'smooth'});
  setTimeout(()=>{
    const r=tgt.getBoundingClientRect(),pad=5,mg=16,vw=window.innerWidth,vh=window.innerHeight;
    spot.classList.add('on');
    spot.style.left=(r.left-pad)+'px';spot.style.top=(r.top-pad)+'px';spot.style.width=(r.width+pad*2)+'px';spot.style.height=(r.height+pad*2)+'px';
    // Position tip — then CLAMP to viewport so Next button is always reachable
    let tl,tt;const tipW=Math.min(460,vw*.88);
    if(step.pos==='below'){tl=Math.max(mg,Math.min(r.left,vw-tipW-mg));tt=r.bottom+16;}
    else if(step.pos==='above'){tl=Math.max(mg,Math.min(r.left,vw-tipW-mg));tt=r.top-16-300;}
    else if(step.pos==='right'){tl=r.right+16;tt=Math.max(mg,r.top);}
    else if(step.pos==='left'){tl=Math.max(mg,r.left-tipW-16);tt=Math.max(mg,r.top);if(tl<mg){tl=mg;tt=r.bottom+16;}}
    // Clamp vertical: ensure tip bottom doesn't exceed viewport
    tip.style.left=tl+'px';tip.style.top=tt+'px';
    requestAnimationFrame(()=>{const tipR=tip.getBoundingClientRect();if(tipR.bottom>vh-mg)tip.style.top=Math.max(mg,vh-tipR.height-mg)+'px';if(tipR.top<mg)tip.style.top=mg+'px';});
  },150);
}
window.addEventListener('resize',()=>{if(tourOn)showStep();});

render();
setTimeout(()=>{if(!localStorage.getItem('mtc5-toured'))startTour();},600);
</script>
